<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Área de Provas</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(270deg, #1e3c72, #2a5298, #6a11cb, #2575fc);
      background-size: 800% 800%;
      animation: gradientBG 10s ease infinite;
      overflow-x: hidden;
    }

    @keyframes gradientBG {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }

    header {
      background: rgba(255,255,255,0.9);
      padding: 15px;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      position: relative;
      z-index: 10;
    }

    header h1 {
      margin: 0;
      color: #007bff;
      font-size: 2rem;
    }

    header p {
      margin: 5px 0 0;
      font-weight: bold;
      color: #333;
    }

    .logoSuperior {
      position: absolute;
      top: -2px;
      right: -2px;
      width: 100px;
      height: 100px;
      object-fit: contain;
      border-radius: 12px;
      z-index: 100;
    }

    .cards {
      display: flex;
      justify-content: center;
      gap: 25px;
      flex-wrap: wrap;
      margin: 40px auto;
      max-width: 800px;
      z-index: 5;
      position: relative;
    }

    .card {
      background: rgba(255,255,255,0.95);
      border-radius: 15px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.25);
      padding: 25px;
      width: 260px;
      text-align: center;
      transition: transform 0.3s, box-shadow 0.3s;
      opacity: 0;
      transform: translateY(30px);
      animation: fadeInUp 0.8s forwards;
    }

    .card:nth-child(1) { animation-delay: 0.2s; }
    .card:nth-child(2) { animation-delay: 0.4s; }

    @keyframes fadeInUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    .card h2 {
      color: #0056b3;
      margin-bottom: 20px;
    }

    .btn {
      display: inline-block;
      padding: 12px 20px;
      background: linear-gradient(135deg, #007bff, #00c6ff);
      color: #fff;
      border: none;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      transition: background 0.3s;
    }

    .btn:hover {
      background: linear-gradient(135deg, #0056b3, #0099cc);
    }
  </style>
</head>
<body>
  <header>
    <h1>Área de Provas</h1>
    <p>Usuário logado: <span id="usuarioLogado"></span></p>
    <img src="logo.png" alt="Logo Academia de Operadores Grupo Inc." class="logoSuperior">
  </header>

  <div class="cards">
    <div class="card">
      <h2>ESCOLA COMUNITÁRIA</h2>
      <a href="provas escola comunitária.html" class="btn">Entrar</a>
    </div>
    <div class="card">
      <h2>OPERADOR - NOVAMED</h2>
      <a href="prova operador.html" class="btn">Entrar</a>
    </div>
  </div>

  <script>
    const nomeUsuario = localStorage.getItem("nomeCadastro");
    document.getElementById("usuarioLogado").textContent = nomeUsuario ? nomeUsuario : "Convidado";
  </script>
</body>
</html>
