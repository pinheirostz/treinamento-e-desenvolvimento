<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Avaliações - Operador 1</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(270deg, #1e3c72, #2a5298, #6a11cb, #2575fc);
      background-size: 800% 800%;
      animation: gradientBG 10s ease infinite;
      overflow-x: hidden;
    }

    @keyframes gradientBG {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }

    header {
      background: rgba(255,255,255,0.9);
      padding: 15px;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      position: relative;
      z-index: 10;
    }

    header h1 {
      margin: 0;
      color: #007bff;
      font-size: 2rem;
    }

    header p {
      margin: 5px 0 0;
      font-weight: bold;
      color: #333;
    }

    .logoSuperior {
      position: absolute;
      top: -2px;
      right: -2px;
      width: 100px;   /* largura fixa */
      height: 100px;  /* altura fixa */
      object-fit: contain; /* mantém proporção */
      z-index: 100;
    }


    .cards {
      display: flex;
      justify-content: center;
      gap: 25px;
      flex-wrap: wrap;
      margin: 40px auto;
      max-width: 1100px;
      z-index: 5;
      position: relative;
    }

    .card {
      background: rgba(255,255,255,0.95);
      border-radius: 15px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.25);
      padding: 25px;
      width: 260px;
      text-align: center;
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    .card h2 {
      color: #0056b3;
      margin-bottom: 20px;
    }

    .btn {
      display: inline-block;
      padding: 12px 20px;
      background: linear-gradient(135deg, #007bff, #00c6ff);
      color: #fff;
      border: none;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      transition: background 0.3s;
    }

    .btn:hover {
      background: linear-gradient(135deg, #0056b3, #0099cc);
    }
  </style>
</head>
<body>
  <header>
    <h1>Provas - Operador 1</h1>
    <p>Usuário logado: <span id="usuarioLogado"></span></p>
    <img src="logo.png" alt="Logo Treinamento" class="logoSuperior">
  </header>

  <div class="cards">
    <div class="card">
      <h2>Pesagem</h2>
      <a href="https://forms.office.com/Pages/ResponsePage.aspx?id=15Pj5huXBEu84bo5Z_YN1H0-YrCzLFtFiS9rhHg8AMNUM0lTN1RUSDVNMkY4WFowNEJVM0M0UDEzUS4u" class="btn">Iniciar</a>
    </div>
    <div class="card">
      <h2>Manipulação</h2>
      <a href="pagina de manipulação.html" class="btn">Iniciar</a>
    </div>
    <div class="card">
      <h2>Revestimento</h2>
      <a href="https://forms.office.com/Pages/ResponsePage.aspx?id=15Pj5huXBEu84bo5Z_YN1H0-YrCzLFtFiS9rhHg8AMNUOEMwVkxPQkxOOEZBRFFaTVE5UjhHRE9MVy4u" class="btn">Iniciar</a>
    </div>
    <div class="card">
      <h2>Compressão</h2>
      <a href="https://forms.office.com/Pages/ResponsePage.aspx?id=15Pj5huXBEu84bo5Z_YN1H0-YrCzLFtFiS9rhHg8AMNURDY1WUlQSktIM0pLSzYwWE1ESDk3V0dYRS4u" class="btn">Iniciar</a>
    </div>
    <div class="card">
      <h2>Setup</h2>
      <a href="https://forms.office.com/Pages/ResponsePage.aspx?id=15Pj5huXBEu84bo5Z_YN1H0-YrCzLFtFiS9rhHg8AMNUMUVON0JKWFRMWEQ4UTI2SDlGVUNEUk1KTy4u" class="btn">Iniciar</a>
    </div>
    <div class="card">
      <h2>Ferramental</h2>
      <a href="prova_ferramental.html" class="btn">Iniciar</a>
    </div>
  </div>

  <script>
    // Recupera o nome salvo no cadastro (localStorage)
    const nomeUsuario = localStorage.getItem("nomeCadastro");
    document.getElementById("usuarioLogado").textContent = nomeUsuario ? nomeUsuario : "Convidado";
  </script>
</body>
</html>
